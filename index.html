<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    height:100%;
}

/* HERO */
.hero{
    position:relative;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80")
    center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Overlay Gelap */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

/* CONTENT */
.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
    max-width:700px;
    padding:20px;
}

.hero-content h1{
    font-size:3.5rem;
    margin-bottom:15px;
}

.hero-content p{
    font-size:1.2rem;
    line-height:1.7;
    margin-bottom:30px;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:14px 30px;
    background:#00bcd4;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#0097a7;
    transform:translateY(-3px);
}

/* WAVE */
.wave-wrapper{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    overflow:hidden;
    line-height:0;
    z-index:1;
}

.wave{
    width:200%;
    height:140px;
    animation:waveMove 12s linear infinite;
}

.wave path{
    fill:rgba(255,255,255,0.4);
}

.wave.second{
    position:absolute;
    bottom:0;
    left:0;
    opacity:0.5;
    animation:waveMoveReverse 18s linear infinite;
}

.wave.second path{
    fill:rgba(255,255,255,0.25);
}

@keyframes waveMove{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

@keyframes waveMoveReverse{
    from{
        transform:translateX(-50%);
    }
    to{
        transform:translateX(0);
    }
}

/* RESPONSIVE */
@media(max-width:768px){

    .hero-content h1{
        font-size:2.3rem;
    }

    .hero-content p{
        font-size:1rem;
    }

    .wave{
        height:90px;
    }
}
</style>
</head>

<body>

<section class="hero">

    <div class="hero-content">
        <h1>Temukan Liburan Impianmu</h1>

        <p>
            Jelajahi pantai, resort, dan destinasi terbaik di dunia
            dengan pengalaman yang tak terlupakan.
        </p>

        <a href="https://www.tiket.com" class="btn">
            Pesan Sekarang
        </a>
    </div>

    <!-- WAVE -->
    <div class="wave-wrapper">

        <svg class="wave" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path d="M0,224L60,213.3C120,203,240,181,360,181.3C480,181,600,203,720,218.7C840,235,960,245,1080,224C1200,203,1320,149,1440,138.7C1560,128,1680,160,1800,181.3C1920,203,2040,213,2160,202.7C2280,192,2400,160,2520,154.7C2640,149,2760,171,2820,181.3L2880,192L2880,320L0,320Z"></path>
        </svg>

        <svg class="wave second" viewBox="0 0 2880 320" preserveAspectRatio="none">
            <path d="M0,256L80,240C160,224,320,192,480,170.7C640,149,800,139,960,154.7C1120,171,1280,213,1440,218.7C1600,224,1760,192,1920,170.7C2080,149,2240,139,2400,154.7C2560,171,2720,213,2800,234.7L2880,256L2880,320L0,320Z"></path>
        </svg>

    </div>

</section>

</body>
</html>
