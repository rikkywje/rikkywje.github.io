<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tropical</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* VIDEO BACKGROUND */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.hero video{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:1;
}

/* DARK OVERLAY */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        rgba(0,0,0,.25),
        rgba(0,0,0,.55)
    );
    z-index:2;
}

/* CONTENT */
.content{
    position:absolute;
    z-index:5;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    width:90%;
}

.content h1{
    font-size:4.5rem;
    letter-spacing:2px;
    text-shadow:0 10px 30px rgba(0,0,0,.6);
}

.content p{
    margin-top:20px;
    font-size:1.2rem;
    opacity:.9;
}

/* BUTTON */
.btn{
    margin-top:30px;
    display:inline-block;
    padding:15px 40px;
    border-radius:50px;
    color:white;
    text-decoration:none;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    backdrop-filter:blur(10px);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,.25);
}

/* PALM TREES */
.palm{
    position:absolute;
    bottom:-20px;
    width:420px;
    z-index:3;
    animation:sway 6s ease-in-out infinite;
    transform-origin:bottom center;
}

.palm.left{
    left:-60px;
}

.palm.right{
    right:-60px;
    animation-delay:2s;
}

@keyframes sway{
    0%,100%{transform:rotate(-3deg);}
    50%{transform:rotate(3deg);}
}

/* MOBILE */
@media(max-width:768px){

    .content h1{
        font-size:2.5rem;
    }

    .palm{
        width:220px;
    }

}

</style>
</head>
<body>

<div class="hero">

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop playsinline>
        <source src="beach.mp4" type="video/mp4">
    </video>

    <!-- POHON KELAPA (PAKAI PNG TRANSPARAN) -->
    <img src="palm-left.png" class="palm left">
    <img src="palm-right.png" class="palm right">

    <!-- TEXT -->
    <div class="content">
        <h1>Tropical Paradise</h1>
        <p>Temukan liburan impianmu di pantai terbaik dunia</p>
        <a href="#" class="btn">Jelajahi Sekarang</a>
    </div>

</div>

</body>
</html>
