<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tropical Paradise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

.hero{
    position:relative;
    height:100vh;

    background:
    linear-gradient(
        rgba(0,0,0,.25),
        rgba(0,0,0,.45)
    ),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2200&q=80");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTENT */

.content{
    position:relative;
    z-index:10;
    text-align:center;
    color:white;
    max-width:800px;
    padding:20px;
}

.content h1{
    font-size:5rem;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:20px;
    text-shadow:0 10px 25px rgba(0,0,0,.4);
}

.content p{
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:35px;
}

.btn{
    display:inline-block;
    padding:16px 40px;
    border-radius:60px;
    text-decoration:none;
    color:white;
    font-weight:600;

    background:
    linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );

    transition:.4s;
}

.btn:hover{
    transform:translateY(-5px);
}

/* SUN */

.sun{
    position:absolute;
    width:250px;
    height:250px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        #ffe082,
        #ff9800
    );

    top:90px;
    right:120px;

    filter:blur(2px);

    box-shadow:
    0 0 60px rgba(255,193,7,.8),
    0 0 150px rgba(255,193,7,.5);
}

/* PALM */

.palm{
    position:absolute;
    bottom:-20px;
    z-index:5;

    transform-origin:bottom center;
}

.leftPalm{
    left:-50px;
    width:420px;

    animation:sway 5s ease-in-out infinite;
}

.rightPalm{
    right:-60px;
    width:380px;

    animation:sway2 6s ease-in-out infinite;
}

.palm img{
    width:100%;
    display:block;
}

@keyframes sway{
    0%,100%{
        transform:rotate(-2deg);
    }

    50%{
        transform:rotate(2deg);
    }
}

@keyframes sway2{
    0%,100%{
        transform:rotate(2deg);
    }

    50%{
        transform:rotate(-2deg);
    }
}

/* WAVES */

.wave{
    position:absolute;
    bottom:0;
    width:200%;
    height:180px;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(6px);

    border-radius:
    100% 100% 0 0;

    animation:wave 12s linear infinite;
}

.wave2{
    bottom:-30px;
    opacity:.4;
    animation-duration:18s;
}

@keyframes wave{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }
}

@media(max-width:768px){

    .content h1{
        font-size:2.8rem;
    }

    .leftPalm{
        width:220px;
    }

    .rightPalm{
        width:200px;
    }

    .sun{
        width:140px;
        height:140px;
    }
}

</style>
</head>
<body>

<section class="hero">

    <div class="sun"></div>

    <!-- Ganti dengan PNG pohon kelapa transparan -->
    <div class="palm leftPalm">
        <img src="palm-left.png">
    </div>

    <div class="palm rightPalm">
        <img src="palm-right.png">
    </div>

    <div class="content">

        <h1>Tropical Paradise</h1>

        <p>
            Temukan resort terbaik, pantai eksotis,
            dan pengalaman liburan tak terlupakan.
        </p>

        <a href="#" class="btn">
            Mulai Jelajahi
        </a>

    </div>

    <div class="wave"></div>
    <div class="wave wave2"></div>

</section>

</body>
</html>
