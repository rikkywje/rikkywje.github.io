        function keyP(event) {
            var x = event.which || event.keyCode;

                event.returnValue = false;
        }

        function disableContextMenuInspect(event) {
            

            if (window.frames[event.name]) { //frameset
                window.frames[event.name].onkeydown = function () {
                    window.frames["fraMain"].document.getElementById("divBetAlert").style.display = "none";
                };
                window.frames[event.name].onclick = function () {
                    window.frames["fraMain"].document.getElementById("divBetAlert").style.display = "none";
                };
            }
        }

    <script type="text/javascript">
        window.addEventListener('storage', function (event) {
            if (event.key === 'selected_lang_code') {
                var newLangCode = event.newValue;
                if (newLangCode) {
                    window.location.href = 'Main.aspx?lang=' + newLangCode;
                }
            }
        });
        var currentLangCode = '';
        if (currentLangCode) {
            var localStorageLang = localStorage.getItem('selected_lang_code');
            if (localStorageLang !== currentLangCode) {
                localStorage.setItem('selected_lang_code', currentLangCode);
            }
        }
</script>
