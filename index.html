<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tropical Paradise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* HERO */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* BACKGROUND MOVING */

.hero::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,.25),
        rgba(0,0,0,.45)
    ),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2200&q=80");

    background-size:cover;
    background-position:center;

    animation:kenburns 30s ease-in-out infinite alternate;

    z-index:1;
}

@keyframes kenburns{

    0%{
        transform:scale(1) translateX(0);
    }

    50%{
        transform:scale(1.08) translateX(-20px);
    }

    100%{
        transform:scale(1.15) translateX(20px);
    }
}

/* SUN */

.sun{
    position:absolute;
    top:80px;
    right:120px;

    width:220px;
    height:220px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        #ffe082,
        #ff9800
    );

    z-index:2;

    opacity:.85;

    box-shadow:
    0 0 80px rgba(255,193,7,.8),
    0 0 180px rgba(255,193,7,.5);

    animation:sunPulse 6s ease-in-out infinite;
}

@keyframes sunPulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }
}

/* CONTENT */

.content{
    position:relative;
    z-index:10;
    color:white;
    max-width:850px;
    padding:20px;
}

.content h1{
    font-size:5rem;
    font-weight:700;
    line-height:1.1;
    margin-bottom:20px;

    text-shadow:
    0 10px 25px rgba(0,0,0,.45);
}

.content p{
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:35px;

    text-shadow:
    0 3px 8px rgba(0,0,0,.4);
}

/* BUTTON */

.btn{
    display:inline-block;

    padding:16px 40px;

    color:white;
    text-decoration:none;
    font-weight:600;

    border-radius:60px;

    backdrop-filter:blur(10px);

    background:
    rgba(255,255,255,.15);

    border:
    1px solid rgba(255,255,255,.3);

    transition:.4s;
}

.btn:hover{

    transform:
    translateY(-5px);

    background:
    rgba(255,255,255,.25);
}

/* PALM TREES */

.palm{
    position:absolute;
    bottom:-30px;
    z-index:6;

    font-size:340px;

    transform-origin:bottom center;
}

.leftPalm{
    left:-40px;
    animation:swayLeft 5s ease-in-out infinite;
}

.rightPalm{
    right:-40px;
    animation:swayRight 6s ease-in-out infinite;
}

@keyframes swayLeft{

    0%,100%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(2deg);
    }
}

@keyframes swayRight{

    0%,100%{
        transform:rotate(3deg);
    }

    50%{
        transform:rotate(-2deg);
    }
}

/* DARK VIGNETTE */

.hero::after{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle,
        transparent 40%,
        rgba(0,0,0,.35)
    );

    z-index:3;
}

/* MOBILE */

@media(max-width:768px){

    .content h1{
        font-size:2.8rem;
    }

    .content p{
        font-size:1rem;
    }

    .sun{
        width:120px;
        height:120px;
        top:70px;
        right:30px;
    }

    .palm{
        font-size:180px;
    }
}

</style>
</head>
<body>

<section class="hero">

    <div class="sun"></div>

    <div class="palm leftPalm">
        🌴
    </div>

    <div class="palm rightPalm">
        🌴
    </div>

    <div class="content">

        <h1>
            Tropical Paradise
        </h1>

        <p>
            Nikmati keindahan pantai tropis, resort mewah,
            dan pengalaman liburan yang tak terlupakan
            di destinasi terbaik dunia.
        </p>

        <a href="#" class="btn">
            Mulai Jelajahi
        </a>

    </div>

</section>

</body>
</html>
