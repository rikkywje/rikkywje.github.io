<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page Travel</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body, html {
    height: 100%;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* overlay gelap */
.hero::before {
    content: "";
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.hero-content {
    position: relative;
    text-align: center;
    color: white;
    max-width: 700px;
    padding: 20px;
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 15px;
}

.hero p {
    font-size: 1.1rem;
    margin-bottom: 25px;
    line-height: 1.6;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #00bcd4;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    transition: 0.3s;
    font-weight: bold;
}

.btn:hover {
    background: #0097a7;
    transform: translateY(-3px);
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Temukan Liburan Impianmu</h1>
        <p>
            Jelajahi pantai, resort, dan destinasi terbaik di dunia dengan pengalaman yang tak terlupakan.
        </p>
        <a href="https://www.tiket.com" class="btn">Pesan Sekarang</a>
    </div>
</div>

</body>
</html>
