<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Score & Odds</title>

<style>
body{
    background:#121212;
    color:#fff;
    font-family:Arial,sans-serif;
}

.container{
    width:900px;
    margin:auto;
}

.match{
    background:#1f1f1f;
    margin:10px 0;
    padding:15px;
    border-radius:8px;
}

.league{
    color:#f0b90b;
    font-size:14px;
    margin-bottom:10px;
}

.teams{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.score{
    font-size:24px;
    font-weight:bold;
}

.odds{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.odd-btn{
    flex:1;
    background:#2b2b2b;
    padding:10px;
    text-align:center;
    border-radius:5px;
    cursor:pointer;
}

.odd-btn:hover{
    background:#3d3d3d;
}

.live{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="match">
        <div class="league">
            FIFA World Cup
            <span class="live">LIVE 78'</span>
        </div>

        <div class="teams">
            <div>Canada</div>
            <div class="score">2 - 1</div>
            <div>Bosnia</div>
        </div>

        <div class="odds">
            <div class="odd-btn">
                Home<br>
                1.85
            </div>

            <div class="odd-btn">
                Draw<br>
                3.40
            </div>

            <div class="odd-btn">
                Away<br>
                4.20
            </div>
        </div>
    </div>

</div>

</body>
</html>
