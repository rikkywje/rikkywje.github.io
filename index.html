<title>Landing Page Pantai</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') center center/cover no-repeat;
}

.overlay{
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.content{
    max-width:700px;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

p{
    font-size:1.1rem;
    margin-bottom:30px;
    line-height:1.6;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    padding:14px 30px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
    text-decoration:none;
    font-weight:bold;
}

.btn-primary{
    background:#00bcd4;
    color:white;
}

.btn-primary:hover{
    background:#0097a7;
    transform:translateY(-3px);
}

.btn-secondary{
    background:white;
    color:#333;
}

.btn-secondary:hover{
    background:#f1f1f1;
    transform:translateY(-3px);
}

.btn-outline{
    background:transparent;
    border:2px solid white;
    color:white;
}

.btn-outline:hover{
    background:white;
    color:#333;
}
</style>
</head>
<body>

    
<div class="overlay">
    <div class="content">
